<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { mercadoYellow: '#FFE600', mercadoBlue: '#3483FA' } } } }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-mercadoYellow py-3 shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <a href="../index.html" class="text-2xl font-black text-gray-800 tracking-tighter">🛒 MarketPlace</a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Seu Carrinho</h1>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-2/3 bg-white rounded-lg shadow-sm p-6">
                <div id="cart-items-container" class="divide-y">
                    </div>
            </div>

            <div class="w-full lg:w-1/3">
                <div class="bg-white rounded-lg shadow-sm p-6 sticky top-24">
                    <h2 class="text-lg font-semibold border-b pb-4 mb-4">Resumo da Compra</h2>
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-gray-600">Total:</span>
                        <span id="cart-total" class="text-2xl font-bold text-gray-900">R$ 0,00</span>
                    </div>
                    <button class="w-full bg-mercadoBlue hover:bg-blue-600 text-white font-bold py-3 rounded transition-colors shadow">
                        Continuar a compra
                    </button>
                    <a href="../index.html" class="block text-center text-mercadoBlue text-sm mt-4 hover:underline">
                        Escolher mais produtos
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/produtos.js"></script>
    <script src="../js/carrinho.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
