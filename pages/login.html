<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MarketPlace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { mercadoYellow: '#FFE600', mercadoBlue: '#3483FA' } } } }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-center items-center px-4">

    <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
        <div class="text-center mb-8">
            <a href="../index.html" class="text-3xl font-black text-gray-800 tracking-tighter block mb-2">🛒 MarketPlace</a>
            <p class="text-gray-500 text-sm">Faça login para continuar</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com" 
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-mercadoBlue focus:outline-none">
            </div>
            <div>
                <label for="senha" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="senha" required placeholder="••••••••" 
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-mercadoBlue focus:outline-none">
            </div>
            <button type="submit" class="w-full bg-mercadoBlue hover:bg-blue-600 text-white font-bold py-2.5 rounded transition-colors shadow">
                Entrar
            </button>
        </form>
    </div>

    <script src="../js/produtos.js"></script>
    <script src="../js/carrinho.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
